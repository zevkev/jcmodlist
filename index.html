<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft JurassicCraft Mod Liste</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<body>

<header>

<h1>Minecraft <span>JurassicCraft</span></h1>

<div class="c">
